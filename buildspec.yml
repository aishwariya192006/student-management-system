version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - echo Installing dependencies...
      - npm install
  pre_build:
    commands:
      - echo Starting pre_build phase...
  build:
    commands:
      - echo Build started on `date`
      - # You can add tests here: npm test
  post_build:
    commands:
      - echo Build completed on `date`

artifacts:
  files:
    - '**/*'
  name: student-management-system-$(date +%Y-%m-%d)
